<!--
  Summer Vibe Hack landing page.
  Single-screen SPA. Served by api/server.py, which injects __BASE_URL__ (the
  server URL) and __COUNT__ (project count) per request.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Summer Vibe Hack</title>
<meta name="description" content="A social wall for hackathon builders. Run one command, land on the wall." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --cream: #fdf5e9;
    --peach: #ffe6ce;
    --accent: #fa4b10;
    --ink: #2b1a12;
    --ink-soft: #6b5347;
    --line: #ecd7bd;
    --field: #fffaf1;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    place-items: center;
    color: var(--ink);
    background: linear-gradient(180deg, var(--cream) 0%, var(--peach) 100%);
    -webkit-font-smoothing: antialiased;
  }

  /* --- swimming ring: thin 3D ascii torus that bounces around --- */
  #ring {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  #ring pre {
    position: absolute;
    top: 0;
    left: 0;
    margin: 0;
    line-height: 1;
    letter-spacing: 0.05em;
    font-weight: 700;
    white-space: pre;
    color: var(--accent);
    will-change: transform;
  }

  /* --- floating card (sharp corners, cursor-driven shadow) --- */
  main {
    position: relative;
    z-index: 1;
    width: min(560px, calc(100vw - 32px));
    padding: 24px 34px 28px;
    background: rgba(253, 245, 233, 0.92);
    border: 1px solid var(--line);
    border-radius: 0;
    box-shadow: 0 30px 90px -20px rgba(250, 75, 16, 0.35);
    transition: box-shadow 0.18s ease;
  }

  h1 {
    font-size: clamp(30px, 6vw, 44px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0 0 24px;
    text-align: center;
  }

  .block { margin: 0 0 18px; }
  .label {
    display: block;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin: 0 0 7px;
  }

  .command {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--field);
    border: 1px solid var(--line);
    border-radius: 0;
    padding: 11px 11px 11px 14px;
  }
  .command code {
    flex: 1;
    min-width: 0;
    font-size: 13.5px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .command code::-webkit-scrollbar { display: none; }
  .prompt { color: var(--accent); user-select: none; }

  .copy {
    flex: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    padding: 0;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    border-radius: 0;
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.14s ease, color 0.14s ease;
  }
  .copy:hover { opacity: 1; }
  .copy svg { width: 18px; height: 18px; }
  .copy.done { color: var(--accent); opacity: 1; }

  /* --- QR inside the card --- */
  .qr {
    display: flex;
    justify-content: center;
    margin: 22px 0 0;
  }
  .qr .frame {
    padding: 12px;
    background: var(--field);
    border: 1px solid var(--line);
  }
  .qr img { display: block; width: 152px; height: 152px; }

  .count {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin: 16px 0 0;
  }
  .count b { color: var(--accent); font-weight: 700; }

  /* --- wall nav at the top middle of the page --- */
  .wallnav {
    position: fixed;
    z-index: 2;
    left: 50%;
    top: 18px;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    background: var(--field);
    border: 1px solid var(--line);
    border-radius: 0;
    text-decoration: none;
    white-space: nowrap;
    box-shadow: 0 10px 30px -12px rgba(250, 75, 16, 0.3);
    transition: color 0.14s ease, border-color 0.14s ease;
  }
  .wallnav:hover { color: var(--accent); border-color: var(--accent); }
  .wallnav svg { width: 14px; height: 14px; }

  /* --- github link at the bottom of the page --- */
  .foot {
    position: fixed;
    z-index: 2;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--ink-soft);
    text-decoration: none;
    white-space: nowrap;
  }
  .foot:hover { color: var(--accent); }
  .foot svg { width: 13px; height: 13px; }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  @media (max-width: 460px) {
    main { padding: 22px 22px 24px; }
  }

  @media (prefers-reduced-motion: reduce) {
    main { transition: none; }
  }
</style>

<div id="ring" aria-hidden="true"></div>

<a class="wallnav" href="/wall/">go to /wall<svg viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"/></svg></a>

<main id="card">
  <h1>get on the wall</h1>

  <div class="block">
    <span class="label">install the skill</span>
    <div class="command">
      <code><span class="prompt">$ </span>curl -fsSL __BASE_URL__/install.sh | sh</code>
      <button class="copy" type="button" data-copy="curl -fsSL __BASE_URL__/install.sh | sh" aria-label="Copy install command" title="Copy">
        <svg viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>
      </button>
    </div>
  </div>

  <div class="block">
    <span class="label">then run the skill</span>
    <div class="command">
      <code>/summer-vibe</code>
      <button class="copy" type="button" data-copy="/summer-vibe" aria-label="Copy skill command" title="Copy">
        <svg viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z"/></svg>
      </button>
    </div>
  </div>

  <div class="qr">
    <div class="frame"><img src="/qr.png" alt="QR code that opens this page" width="152" height="152" /></div>
  </div>

  <p class="count"><b id="count">__COUNT__</b>&nbsp;projects on the wall</p>
</main>

<a class="foot" href="https://github.com/luaroncrew/summer-vibe-hack" target="_blank" rel="noopener">github.com/luaroncrew/summer-vibe-hack<svg viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M200,64V168a8,8,0,0,1-16,0V83.31L69.66,197.66a8,8,0,0,1-11.32-11.32L172.69,72H88a8,8,0,0,1,0-16H192A8,8,0,0,1,200,64Z"/></svg></a>

<script>
  // Copy buttons: each copies its data-copy text and flips to a check glyph.
  (function () {
    var COPY = "M216,32H88a8,8,0,0,0-8,8V80H40a8,8,0,0,0-8,8V216a8,8,0,0,0,8,8H168a8,8,0,0,0,8-8V176h40a8,8,0,0,0,8-8V40A8,8,0,0,0,216,32ZM160,208H48V96H160Zm48-48H176V88a8,8,0,0,0-8-8H96V48H208Z";
    var CHECK = "M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z";
    document.querySelectorAll(".copy").forEach(function (btn) {
      var path = btn.querySelector("path");
      btn.addEventListener("click", function () {
        navigator.clipboard.writeText(btn.getAttribute("data-copy")).then(function () {
          path.setAttribute("d", CHECK);
          btn.classList.add("done");
          setTimeout(function () { path.setAttribute("d", COPY); btn.classList.remove("done"); }, 1600);
        });
      });
    });
  })();

  // Cursor-driven shadow: the shadow falls on the same side as the pointer.
  (function () {
    var card = document.getElementById("card");
    var rest = "0 30px 90px -20px rgba(250, 75, 16, 0.35)";
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    card.addEventListener("pointermove", function (e) {
      var r = card.getBoundingClientRect();
      var dx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);
      var dy = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);
      var ox = dx * 52;
      var oy = dy * 52;
      card.style.boxShadow = ox.toFixed(1) + "px " + oy.toFixed(1) + "px 110px -10px rgba(250, 75, 16, 0.42)";
    });
    card.addEventListener("pointerleave", function () { card.style.boxShadow = rest; });
  })();

  // --- several thin ascii swimming rings: flying, spinning, bouncing off the
  //     viewport edges and the central card (small overlap allowed) ---
  (function () {
    var container = document.getElementById("ring");
    var cardEl = document.getElementById("card");
    var chars = ".,-~:;=!*#$@";
    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var k = Math.max(0.62, Math.min(1, window.innerWidth / 1280));
    var COLS = 36, ROWS = 18, R1 = 0.5, R2 = 2;   // thin tube, wide hole

    // font px, opacity, start fraction of viewport, velocity px/frame
    var SPECS = [
      { font: 13, op: 0.5,  fx: 0.10, fy: 0.16, vx: 1.3,  vy: 1.0 },
      { font: 9,  op: 0.4,  fx: 0.66, fy: 0.12, vx: -1.1, vy: 1.4 },
      { font: 11, op: 0.45, fx: 0.20, fy: 0.70, vx: 1.6,  vy: -0.9 },
      { font: 8,  op: 0.36, fx: 0.84, fy: 0.74, vx: -1.2, vy: -1.2 },
      { font: 12, op: 0.42, fx: 0.90, fy: 0.34, vx: 0.9,  vy: 1.5 }
    ];

    var rings = SPECS.map(function (s, i) {
      var el = document.createElement("pre");
      el.style.fontSize = (s.font * k).toFixed(1) + "px";
      el.style.opacity = s.op;
      container.appendChild(el);
      return {
        el: el, A: i * 1.3, B: i * 0.7,
        dA: 0.03 + i * 0.006, dB: 0.02 + i * 0.004,
        px: s.fx * window.innerWidth, py: s.fy * window.innerHeight,
        vx: s.vx, vy: s.vy
      };
    });

    function build(r) {
      var b = new Array(COLS * ROWS).fill(" ");
      var z = new Array(COLS * ROWS).fill(0);
      var cA = Math.cos(r.A), sA = Math.sin(r.A);
      var cB = Math.cos(r.B), sB = Math.sin(r.B);
      for (var theta = 0; theta < 6.283; theta += 0.07) {
        var ct = Math.cos(theta), st = Math.sin(theta);
        for (var phi = 0; phi < 6.283; phi += 0.03) {
          var cp = Math.cos(phi), sp = Math.sin(phi);
          var circleX = R2 + R1 * ct, circleY = R1 * st;
          var x = circleX * (cB * cp + sA * sB * sp) - circleY * cA * sB;
          var y = circleX * (sB * cp - sA * cB * sp) + circleY * cA * cB;
          var ooz = 1 / (5 + cA * circleX * sp + circleY * sA);
          // x/y scale differ ~2x to correct for the tall character cell
          var xp = Math.floor(COLS / 2 + 0.46 * COLS * ooz * x);
          var yp = Math.floor(ROWS / 2 - 0.23 * COLS * ooz * y);
          var L = cp * ct * sB - cA * ct * sp - sA * st + cB * (cA * st - ct * sA * sp);
          if (yp >= 0 && yp < ROWS && xp >= 0 && xp < COLS) {
            var idx = xp + COLS * yp;
            if (ooz > z[idx]) { z[idx] = ooz; var lum = L > 0 ? L : 0; b[idx] = chars[Math.min(chars.length - 1, Math.floor(lum * 8))]; }
          }
        }
      }
      var out = "";
      for (var row = 0; row < ROWS; row++) out += b.slice(row * COLS, row * COLS + COLS).join("") + "\n";
      r.el.textContent = out;
    }

    // Bounce off the card, but let rings dip `m` px into it before turning.
    function hitCard(r, w, h, c) {
      var m = 28;
      var cx = c.left + m, cy = c.top + m, cw = c.width - 2 * m, ch = c.height - 2 * m;
      if (cw <= 0 || ch <= 0) return;
      if (r.px + w > cx && r.px < cx + cw && r.py + h > cy && r.py < cy + ch) {
        var penL = r.px + w - cx, penR = cx + cw - r.px;
        var penT = r.py + h - cy, penB = cy + ch - r.py;
        if (Math.min(penL, penR) < Math.min(penT, penB)) {
          if (penL < penR) { r.px -= penL; r.vx = -Math.abs(r.vx); }
          else { r.px += penR; r.vx = Math.abs(r.vx); }
        } else {
          if (penT < penB) { r.py -= penT; r.vy = -Math.abs(r.vy); }
          else { r.py += penB; r.vy = Math.abs(r.vy); }
        }
      }
    }

    if (reduce) {
      rings.forEach(function (r) { build(r); r.el.style.transform = "translate(" + r.px + "px," + r.py + "px)"; });
      return;
    }

    var last = 0;
    function loop(now) {
      if (now - last > 40) {
        last = now;
        var c = cardEl.getBoundingClientRect();
        for (var i = 0; i < rings.length; i++) {
          var r = rings[i];
          build(r);
          var w = r.el.offsetWidth, h = r.el.offsetHeight;
          r.px += r.vx; r.py += r.vy;
          var maxX = window.innerWidth - w, maxY = window.innerHeight - h;
          if (r.px <= 0) { r.px = 0; r.vx = Math.abs(r.vx); }
          else if (r.px >= maxX) { r.px = maxX; r.vx = -Math.abs(r.vx); }
          if (r.py <= 0) { r.py = 0; r.vy = Math.abs(r.vy); }
          else if (r.py >= maxY) { r.py = maxY; r.vy = -Math.abs(r.vy); }
          hitCard(r, w, h, c);
          r.el.style.transform = "translate(" + r.px + "px," + r.py + "px)";
          r.A += r.dA; r.B += r.dB;
        }
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
</script>
